<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f0f">
<title>FitTrack - Fitness & Nutrition Tracker</title>
<style>
:root{--bg:#0d0f0f;--bg2:#141717;--bg3:#1a1e1e;--card:#1e2424;--border:#2a3030;--green:#4ade80;--orange:#fb923c;--blue:#60a5fa;--yellow:#fbbf24;--red:#f87171;--text:#e8edec;--muted:#8a9e9a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{flex-shrink:0;padding:env(safe-area-inset-top) 16px 10px;padding-top:calc(env(safe-area-inset-top)+14px);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-0.5px}
.hdr-date{font-size:12px;color:var(--muted)}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.bnav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;height:calc(58px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:7.5px;font-weight:700;letter-spacing:.05em;transition:color .2s}
.ni.active{color:var(--green)}
.ni svg{width:18px;height:18px}
.pg{display:none;padding:16px;min-height:100%}.pg.active{display:block}

.food-search{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;margin-bottom:12px}
.food-search:focus{border-color:var(--green);outline:none}
.food-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
.food-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.food-item:active{background:rgba(74,222,128,.1);border-color:var(--green)}
.food-name{font-weight:600;font-size:13px;margin-bottom:3px}
.food-macros{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--muted)}
.macro-badge{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:6px}

.sh{display:flex;align-items:baseline;justify-content:space-between;margin:20px 0 10px}
.sh:first-child{margin-top:0}
.sh-title{font-size:17px;font-weight:700;letter-spacing:-.4px}
.sh-btn{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-weight:600;padding:0}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.cb{padding:14px 16px}

.pill{padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap;display:inline-block}
.pill-g{background:rgba(74,222,128,.14);color:var(--green)}
.po{background:rgba(251,146,60,.14);color:var(--orange)}
.pb{background:rgba(96,165,250,.14);color:var(--blue)}
.py{background:rgba(251,191,36,.14);color:var(--yellow)}
.pm{background:rgba(255,255,255,.07);color:var(--muted)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.sv{font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;color:var(--green)}
.sv.o{color:var(--orange)}
.sv.b{color:var(--blue)}
.sl{font-size:11px;color:var(--muted)}

.tbanner{background:linear-gradient(135deg,rgba(74,222,128,.11),rgba(74,222,128,.03));border:1px solid rgba(74,222,128,.2);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer}
.tt{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.tn{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.td{font-size:13px;color:var(--muted);margin-bottom:10px}
.ttags{display:flex;gap:6px;flex-wrap:wrap}

.macro-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.macro-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.macro-card.c{border-color:rgba(96,165,250,.3)}
.macro-card.p{border-color:rgba(74,222,128,.3)}
.macro-card.f{border-color:rgba(251,146,60,.3)}
.macro-card.cal{border-color:rgba(251,191,36,.3)}
.macro-val{font-size:18px;font-weight:800;line-height:1;margin-bottom:4px}
.macro-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}

.mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border-bottom:none}
.mlbl{width:60px;font-size:11px;color:var(--muted);font-weight:600}
.mbw{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.mbar{height:100%;border-radius:100px;transition:width .3s}
.mval{width:70px;text-align:right;font-size:11px;font-weight:700;font-family:monospace}

.rentry{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.rentry:last-child{border-bottom:none}
.rico{width:38px;height:38px;border-radius:10px;background:rgba(74,222,128,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-weight:600;font-size:13px}
.rmeta{font-size:11px;color:var(--muted);margin-top:1px}
.rstats{text-align:right;flex-shrink:0}
.rdist{font-weight:800;font-size:16px;color:var(--green)}
.rcal{font-size:13px;color:var(--orange)}
.rpace{font-size:11px;color:var(--muted)}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.35);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.35);color:var(--red)}

.ovl{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ovl.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);width:100%;padding:16px 16px calc(24px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .3s;max-height:90vh;overflow-y:auto}
.ovl.open .sheet{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.stitle{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}

.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
.form-input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit}
.form-input:focus{border-color:var(--green);outline:none}
.form-input-small{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.form-input-small:focus{border-color:var(--green);outline:none}

.frow{display:flex;gap:10px;margin-bottom:12px}
.frow .form-group{flex:1;margin-bottom:0}

.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.frow3 .form-group{margin-bottom:0}

.intensity-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.intensity-btn{padding:12px;border:2px solid var(--border);background:var(--card);border-radius:10px;color:var(--text);cursor:pointer;font-weight:600;transition:all .15s;text-align:center}
.intensity-btn.selected{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
.intensity-btn:active{transform:scale(.97)}

.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.btn:active{transform:scale(.97)}
.btnP{background:var(--green);color:#0d1210}
.btnS{background:rgba(255,255,255,.08);color:var(--text)}
.btnW{width:100%}

.measurement-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.measurement-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .15s}
.measurement-card:active{transform:scale(.97);background:rgba(74,222,128,.1);border-color:var(--green)}
.measurement-val{font-size:16px;font-weight:800;color:var(--green);margin-bottom:3px}
.measurement-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.measurement-date{font-size:9px;color:var(--muted);margin-top:3px}

.tab-selector{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.tab-btn{flex-shrink:0;padding:8px 14px;border-radius:100px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--green);border-color:var(--green);color:#0d1210}

canvas{display:block;width:100%}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-brand">⚡ FitTrack</div>
    <div class="hdr-date" id="hDate"></div>
  </div>
  <div class="scrl" id="scrl"></div>
  <nav class="bnav">
    <button class="ni active" id="nb-dash" onclick="go('dash')" style="font-size:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      HOME
    </button>
    <button class="ni" id="nb-activity" onclick="go('activity')" style="font-size:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12h18M12 3v18M6 6l12 12M18 6L6 18"/></svg>
      ACTIVITY
    </button>
    <button class="ni" id="nb-diet" onclick="go('diet')" style="font-size:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C8 2 5 5.5 5 10c0 3 1.5 5.5 3.5 7H15.5C17.5 15.5 19 13 19 10c0-4.5-3-8-7-8z"/></svg>
      DIET
    </button>
    <button class="ni" id="nb-progress" onclick="go('progress')" style="font-size:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      PROGRESS
    </button>
    <button class="ni" id="nb-settings" onclick="go('settings')" style="font-size:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 0l4.24-4.24M4.22 19.78l4.24-4.24m5.08 0l4.24 4.24"/></svg>
      SETTINGS
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div class="ovl" id="ovl" onclick="maybeClose(event)"><div class="sheet" id="sheet"><div id="sheetBody"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const BADMINTON_RULES = {
  amateur: {
    label: 'Amateur',
    description: 'Recreational play, slower pace, frequent breaks',
    caloriesPerKgPerHour: 5.5
  },
  intermediate: {
    label: 'Intermediate',
    description: 'Competitive play, faster pace, longer rallies',
    caloriesPerKgPerHour: 7.5
  }
};

const MEASUREMENTS = {
  neck: { label: 'Neck', icon: '◯' },
  chest: { label: 'Chest', icon: '◯' },
  waist: { label: 'Waist', icon: '◯' },
  hips: { label: 'Hips', icon: '◯' },
  thigh: { label: 'Thigh', icon: '◯' },
  bicep: { label: 'Bicep', icon: '◯' },
  naval: { label: 'Naval', icon: '◯' }
};

const SCHEDULE = {
  MON:{type:'run',label:'Easy Run',detail:'5–8km · Conversational pace'},
  TUE:{type:'strength',label:'Strength Day',detail:'Full body workout'},
  WED:{type:'run',label:'Intervals / Tempo',detail:'Speed work or threshold run'},
  THU:{type:'badminton',label:'Badminton',detail:'Court session'},
  FRI:{type:'strength',label:'Strength Day',detail:'Full body workout'},
  SAT:{type:'activity',label:'Mixed Activity',detail:'Run or badminton'},
  SUN:{type:'rest',label:'Rest & Recovery',detail:'Light walk · Stretch'}
};
const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];

// ═══════════════════════════════════════
// INDEXEDDB
// ══════════════════��════════════════════
let DB;
function initDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('FitTrack',7);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('activities')){const s=d.createObjectStore('activities',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('mealLogs')){const s=d.createObjectStore('mealLogs',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('measurements')){const s=d.createObjectStore('measurements',{keyPath:'id',autoIncrement:true});s.createIndex('date','date')}
      if(!d.objectStoreNames.contains('settings')){d.createObjectStore('settings',{keyPath:'key'})}
    };
    r.onsuccess=e=>{DB=e.target.result;res()};
    r.onerror=rej;
  });
}
function tx(s,m='readonly'){return DB.transaction(s,m).objectStore(s)}
function dbGet(s,k){return new Promise(r=>{const q=tx(s).get(k);q.onsuccess=e=>r(e.target.result)})}
function dbAll(s,idx,q){return new Promise(r=>{const st=tx(s);const req=idx?st.index(idx).getAll(q):st.getAll();req.onsuccess=e=>r(e.target.result||[])})}
function dbPut(s,d){return new Promise((r,j)=>{const q=tx(s,'readwrite').put(d);q.onsuccess=e=>r(e.target.result);q.onerror=j})}
function dbDel(s,id){return new Promise(r=>{tx(s,'readwrite').delete(id).onsuccess=()=>r()})}
async function getSetting(k,def){const r=await dbGet('settings',k);return r?r.val:def}
async function setSetting(k,v){await dbPut('settings',{key:k,val:v})}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function todayCode(){const d=new Date().getDay();return DAYS[d===0?6:d-1]}
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}
function greet(){const h=new Date().getHours();return h<12?'Morning':h<17?'Afternoon':'Evening'}
function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.classList.remove('show'),2500)}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const ST={page:'dash',selectedBadmintonIntensity:null};

// ═══════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════
async function go(page){
  ST.page=page;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('nb-'+page)?.classList.add('active');
  const el=document.getElementById('scrl');el.innerHTML='';el.scrollTop=0;
  const div=document.createElement('div');div.className='pg active';el.appendChild(div);
  await ({dash:renderDash,activity:renderActivity,diet:renderDiet,progress:renderProgress,settings:renderSettings}[page]||renderDash)(div);
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
async function renderDash(el){
  const tc=todayCode(),sc=SCHEDULE[tc];
  const weight=await getSetting('weight',70);
  const targetWeight=await getSetting('targetWeight',65);
  const dailyCal=await getSetting('dailyCalories',2500);
  const activities=await dbAll('activities');
  const meals=await dbAll('mealLogs');
  const measurements=await dbAll('measurements');
  const todayActivities=activities.filter(a=>a.date===today());
  const todayMeals=meals.filter(m=>m.date===today());
  const latestMeasurements=measurements.length>0?measurements.sort((a,b)=>b.date.localeCompare(a.date))[0]:null;

  let totalCal=0,totalProt=0,totalCarbs=0,totalFats=0;
  for(const meal of todayMeals){
    totalCal+=meal.energy||0;
    totalProt+=meal.protein||0;
    totalCarbs+=meal.carbs||0;
    totalFats+=meal.fats||0;
  }
  let activitiesCal=0;
  for(const act of todayActivities){
    activitiesCal+=act.caloriesBurned||0;
  }
  const netCal=totalCal-activitiesCal;
  const weightProgress=(weight-targetWeight).toFixed(1);
  const progressColor=weight>targetWeight?'var(--orange)':'var(--green)';

  el.innerHTML=`
  <div style="margin-bottom:14px">
    <div style="font-size:22px;font-weight:800;letter-spacing:-.5px">Good ${greet()} 👋</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">${fmtDate(new Date())}</div>
  </div>
  <div class="tbanner" onclick="go('activity')">
    <div class="tt">Today · ${tc}</div>
    <div class="tn">${sc.label}</div>
    <div class="td">${sc.detail}</div>
    <div class="ttags">
      <span class="pill pill-g">💪 Log Activity</span>
    </div>
  </div>
  <div class="sg sg4">
    <div class="sc"><div class="sv">${weight}kg</div><div class="sl">Weight</div></div>
    <div class="sc"><div class="sv" style="color:${progressColor}">${weightProgress}kg</div><div class="sl">to Target</div></div>
    <div class="sc"><div class="sv o">${Math.round(totalCal)}</div><div class="sl">Eaten</div></div>
    <div class="sc"><div class="sv b">${Math.round(activitiesCal)}</div><div class="sl">Burned</div></div>
  </div>
  <div class="sh"><div class="sh-title">Daily Target: ${dailyCal}cal</div></div>
  <div class="card"><div class="cb">
    <div class="mrow">
      <div class="mlbl">Consumed</div>
      <div class="mbw"><div class="mbar" style="width:${Math.min((totalCal/dailyCal)*100,100)}%;background:var(--orange)"></div></div>
      <div class="mval">${Math.round(totalCal)}</div>
    </div>
    <div class="mrow">
      <div class="mlbl">Burned</div>
      <div class="mbw"><div class="mbar" style="width:${Math.min((activitiesCal/(dailyCal*0.3))*100,100)}%;background:var(--green)"></div></div>
      <div class="mval">${Math.round(activitiesCal)}</div>
    </div>
    <div class="mrow">
      <div class="mlbl">Net</div>
      <div class="mbw"><div class="mbar" style="width:${Math.min(Math.abs(netCal)/dailyCal*100,100)}%;background:${netCal>0?'var(--orange)':'var(--green)'}"></div></div>
      <div class="mval">${Math.round(netCal)}</div>
    </div>
  </div></div>
  ${latestMeasurements?`<div class="sh"><div class="sh-title">Latest Measurements</div><button class="sh-btn" onclick="openMeasurementsSheet()">+ Update</button></div>
  <div class="measurement-grid">
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.neck}cm</div>
      <div class="measurement-label">Neck</div>
      <div class="measurement-date">${latestMeasurements.date}</div>
    </div>
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.chest}cm</div>
      <div class="measurement-label">Chest</div>
      <div class="measurement-date">${latestMeasurements.date}</div>
    </div>
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.waist}cm</div>
      <div class="measurement-label">Waist</div>
      <div class="measurement-date">${latestMeasurements.date}</div>
    </div>
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.hips}cm</div>
      <div class="measurement-label">Hips</div>
      <div class="measurement-date">${latestMeasurements.date}</div>
    </div>
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.thigh}cm</div>
      <div class="measurement-label">Thigh</div>
      <div class="measurement-date">${latestMeasurements.date}</div>
    </div>
    <div class="measurement-card">
      <div class="measurement-val">${latestMeasurements.bicep}cm</div>

function selectIntensity(intensity){
  ST.selectedBadmintonIntensity=intensity;
  document.getElementById('amateurBtn').classList.toggle('selected',intensity==='amateur');
  document.getElementById('intermediateBtn').classList.toggle('selected',intensity==='intermediate');
  const desc=BADMINTON_RULES[intensity].description;
  document.getElementById('intensityDesc').textContent=desc;
}

async function saveActivity(type){
  const name=document.getElementById('actName').value||type.charAt(0).toUpperCase()+type.slice(1);
  const duration=parseInt(document.getElementById('actDur').value);
  const weight=await getSetting('weight',70);
  
  if(!duration){showToast('Duration required','err');return;}
  
  let caloriesBurned=0,distance=0;
  
  if(type==='run'){
    distance=parseFloat(document.getElementById('actDist').value);
    if(!distance){showToast('Distance required','err');return;}
    caloriesBurned=distance*weight*1.1;
  }else if(type==='badminton'){
    if(!ST.selectedBadmintonIntensity){showToast('Select intensity level','err');return;}
    const rule=BADMINTON_RULES[ST.selectedBadmintonIntensity];
    caloriesBurned=weight*(duration/60)*rule.caloriesPerKgPerHour;
  }
  
  await dbPut('activities',{type,name,duration,distance,intensity:ST.selectedBadmintonIntensity,caloriesBurned,date:today()});
  document.getElementById('ovl').classList.remove('open');
  showToast(`Activity logged! +${Math.round(caloriesBurned)} cal`,'ok');
  go('activity');
}

function openFoodSheet(){
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`
    <div class="hdl"></div>
    <div class="stitle">Add Food (Open Food Facts)</div>
    <div style="margin-bottom:12px">
      <input type="text" id="foodSearch" class="food-search" placeholder="Search foods..." oninput="searchFoods()">
    </div>
    <div id="searchStatus" style="font-size:12px;color:var(--muted);text-align:center;padding:20px">Start typing to search...</div>
    <div class="food-list" id="foodList"></div>
  `;
  document.getElementById('ovl').classList.add('open');
}

async function searchFoods(){
  const query=document.getElementById('foodSearch').value;
  if(!query||query.length<2){
    document.getElementById('searchStatus').textContent='Start typing to search...';
    document.getElementById('foodList').innerHTML='';
    return;
  }
  
  document.getElementById('searchStatus').textContent='Searching...';
  try{
    const response=await axios.get('https://world.openfoodfacts.org/cgi/search.pl',{
      params:{
        search_terms:query,
        action:'process',
        json:1,
        page_size:20
      }
    });
    
    const foods=response.data.products||[];
    const foodList=document.getElementById('foodList');
    
    if(foods.length===0){
      document.getElementById('searchStatus').textContent='No foods found';
      foodList.innerHTML='';
      return;
    }
    
    document.getElementById('searchStatus').textContent='';
    foodList.innerHTML=foods.map((f,i)=>`
      <div class="food-item" onclick="selectFood('${i}','${f.product_name.replace(/'/g,'\\\'')}',${f.nutriments?.energy_kcal||f.nutriments?.energy||0},${f.nutriments?.proteins||0},${f.nutriments?.carbohydrates||0},${f.nutriments?.fat||0})">
        <div class="food-name">${f.product_name}</div>
        <div class="food-macros">
          <div class="macro-badge" style="color:var(--yellow)">${Math.round(f.nutriments?.energy_kcal||f.nutriments?.energy||0)}cal</div>
          ${f.nutriments?.proteins?`<div class="macro-badge" style="color:var(--green)">P: ${f.nutriments.proteins.toFixed(1)}g</div>`:''}
          ${f.nutriments?.carbohydrates?`<div class="macro-badge" style="color:var(--blue)">C: ${f.nutriments.carbohydrates.toFixed(1)}g</div>`:''}
          ${f.nutriments?.fat?`<div class="macro-badge" style="color:var(--orange)">F: ${f.nutriments.fat.toFixed(1)}g</div>`:''}
        </div>
      </div>
    `).join('');
  }catch(e){
    document.getElementById('searchStatus').textContent='Search error. Try again.';
    console.error(e);
  }
}

async function selectFood(idx,name,energy,protein,carbs,fats){
  const servings=prompt(`Servings of ${name}?`,1);
  if(!servings)return;
  const s=parseFloat(servings);
  await dbPut('mealLogs',{
    foodName:name,
    servings:s,
    energy:energy*s,
    protein:protein*s,
    carbs:carbs*s,
    fats:fats*s,
    date:today()
  });
  document.getElementById('ovl').classList.remove('open');
  showToast(`${name} added!`,'ok');
  go('diet');
}

async function delMeal(id){
  if(!confirm('Delete?'))return;
  await dbDel('mealLogs',id);
  go('diet');
}
